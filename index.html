<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AurX AI - Déconnecté</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
  
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #000;
    color: #fff;
    font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* GRID STABLE */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: 
      linear-gradient(rgba(10,132,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(10,132,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: 0;
    animation: gridMove 15s linear infinite;
    will-change: transform;
  }

  @keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(50px, 50px); }
  }

  /* BULLES STABLES */
  .bubbles {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 0;
  }

  .bubble {
    position: absolute;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    text-align: center;
    padding: 12px;
    animation: floatStable 35s infinite ease-in-out, glowStable 6s infinite ease-in-out;
    opacity: 0.85;
    backdrop-filter: blur(20px);
    border: 2px solid rgba(255,255,255,0.2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: opacity 0.8s ease;
    will-change: transform;
  }

  @keyframes floatStable {
    0%, 100% { 
      transform: translate(0, 0) scale(1); 
    }
    50% { 
      transform: translate(90px, -70px) scale(1.05); 
    }
  }

  @keyframes glowStable {
    0%, 100% { 
      background: radial-gradient(circle at 30% 30%, rgba(10,132,255,0.4), rgba(10,132,255,0.1));
      box-shadow: 0 0 50px rgba(10,132,255,0.5), 
                  0 0 100px rgba(10,132,255,0.2),
                  inset 0 0 25px rgba(255,255,255,0.1);
    }
    33% { 
      background: radial-gradient(circle at 30% 30%, rgba(191,90,242,0.4), rgba(191,90,242,0.1));
      box-shadow: 0 0 50px rgba(191,90,242,0.5), 
                  0 0 100px rgba(191,90,242,0.2),
                  inset 0 0 25px rgba(255,255,255,0.1);
    }
    66% { 
      background: radial-gradient(circle at 30% 30%, rgba(48,209,88,0.4), rgba(48,209,88,0.1));
      box-shadow: 0 0 50px rgba(48,209,88,0.5), 
                  0 0 100px rgba(48,209,88,0.2),
                  inset 0 0 25px rgba(255,255,255,0.1);
    }
  }

  .bubble:nth-child(1) { width: 135px; height: 135px; left: 10%; top: 20%; animation-delay: 0s, 0s; }
  .bubble:nth-child(2) { width: 98px; height: 98px; left: 72%; top: 15%; animation-delay: -5s, -1s; }
  .bubble:nth-child(3) { width: 118px; height: 118px; left: 52%; top: 62%; animation-delay: -10s, -2s; }
  .bubble:nth-child(4) { width: 88px; height: 88px; left: 20%; top: 70%; animation-delay: -15s, -3s; }
  .bubble:nth-child(5) { width: 108px; height: 108px; left: 82%; top: 50%; animation-delay: -20s, -4s; }
  .bubble:nth-child(6) { width: 102px; height: 102px; left: 42%; top: 30%; animation-delay: -25s, -5s; }
  .bubble:nth-child(7) { width: 92px; height: 92px; left: 67%; top: 75%; animation-delay: -8s, -1.5s; }
  .bubble:nth-child(8) { width: 82px; height: 82px; left: 28%; top: 45%; animation-delay: -12s, -2.5s; }

  /* CONTENU CENTRAL */
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px 20px;
    max-width: 650px;
  }

  h1 {
    font-size: 64px;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -3px;
    background: linear-gradient(135deg, #0A84FF 0%, #BF5AF2 50%, #30D158 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(10,132,255,0.4));
  }

  .subtitle {
    font-size: 16px;
    color: #666;
    margin-bottom: 60px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* BOUTONS STABLES */
  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
  }

  .btn {
    width: 100%;
    padding: 20px;
    background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 16px;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }

  .btn:hover::before {
    transform: translateX(100%);
  }

  .btn:hover {
    transform: translateY(-2px);
    border-color: rgba(10,132,255,0.6);
    box-shadow: 0 8px 40px rgba(10,132,255,0.4);
  }

  .btn:active {
    transform: scale(0.97);
  }

  .btn-back {
    background: linear-gradient(135deg, rgba(10,132,255,0.25), rgba(191,90,242,0.25));
    border: 1px solid rgba(10,132,255,0.5);
    color: #fff;
  }

  .btn-back:hover {
    border-color: rgba(10,132,255,0.9);
    box-shadow: 0 8px 40px rgba(10,132,255,0.5);
  }

  .btn-back:active {
    background: linear-gradient(135deg, rgba(10,132,255,0.4), rgba(191,90,242,0.4));
  }

  .google-icon {
    width: 22px;
    height: 22px;
  }

  @media (max-width: 768px) {
    h1 { font-size: 44px; }
    .subtitle { font-size: 14px; }
    .bubble { font-size: 9px; padding: 10px; }
  }
</style>
</head>
<body>

<div class="bubbles">
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
</div>

<div class="content">
  <h1>AurX AI</h1>
  <p class="subtitle">Déconnecté</p>
  
  <div class="btn-group">
    <button class="btn" id="loginBtn">
      <svg class="google-icon" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.96H.957C.347 6.175 0 7.55 0 9c0 1.45.347 2.825.957 4.04l3.007-2.328z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.96L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Reconnecter avec Google
    </button>
    <button class="btn btn-back" id="backBtn">Retour à AurX</button>
  </div>
</div>

<script>
  const AUTH_URL = 'https://aur-x-backend.vercel.app/api/auth/google';
  const MAIN_URL = 'https://aurx.vercel.app/';
  
  const words = [
    'AURX', 'NEURAL', 'QUANTUM', 'CODER', 'BUILD',
    'INNOVATE', 'DEPLOY', 'SCALE', 'OPTIMIZE', 'DESIGN',
    'ARCHITECT', 'FUTURE', 'SMART', 'AUTO', 'SYNC',
    'PYTHON', 'RUST', 'REACT', 'VUE', 'NODE',
    'VISION', 'VOICE', 'CHAT', 'GEN AI', 'LLM',
    'FIRMINX', 'RDC', 'KINSHASA', 'AFRICA', 'NEXT',
    'CLOUD', 'EDGE', 'API', 'SECURE', 'FAST',
    'LEARN', 'CREATE', 'THINK', 'SOLVE', 'SHIP'
  ];

  const bubbles = document.querySelectorAll('.bubble');
  
  function changeWords() {
    bubbles.forEach(bubble => {
      bubble.style.opacity = '0';
      setTimeout(() => {
        const randomWord = words[Math.floor(Math.random() * words.length)];
        bubble.innerHTML = randomWord.replace(' ', '<br>');
        bubble.style.opacity = '0.85';
      }, 400);
    });
  }

  bubbles.forEach(bubble => {
    const randomWord = words[Math.floor(Math.random() * words.length)];
    bubble.innerHTML = randomWord.replace(' ', '<br>');
  });

  // STABLE : 4 secondes
  setInterval(changeWords, 4000);

  document.getElementById('loginBtn').addEventListener('click', () => {
    window.location.href = AUTH_URL;
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    window.location.href = MAIN_URL;
  });
</script>

</body>
</html>
